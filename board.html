<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Dottery</title>
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
  <link rel="icon" href="/icons/icon-32.png" type="image/png" sizes="32x32" />
  <link rel="apple-touch-icon" href="/icons/icon-180.png" sizes="180x180" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="/page-transition.css" />
  <script src="/page-transition-prep.js"></script>
  <script src="/fullscreen-auto.js"></script>
</head>
<body>
  <div id="pageSheet" class="page-sheet" aria-hidden="true"></div>
  <div id="pageStage" class="page-stage">
  <div class="board-aurora" aria-hidden="true">
    <span class="board-aurora-blob board-aurora-blob--a"></span>
    <span class="board-aurora-blob board-aurora-blob--b"></span>
  </div>
  <img class="board-backdrop" id="boardDetailImage" alt="" hidden />

  <a class="home-link home-link--float" href="/shop" aria-label="home">←</a>
  <div class="price-calc price-calc--board" id="priceCalc" hidden>
    <div class="price-calc__session" id="priceCalcSession">
      <span class="price-calc__code" id="priceCalcCode"></span>
      <span class="price-calc__amount" id="priceCalcAmount"></span>
    </div>
  </div>
  <div class="board-progress" id="boardProgress"></div>
  <button type="button" class="fullscreen-btn" id="fullscreenBtn" aria-label="fullscreen" hidden>
    <svg class="fullscreen-btn__enter" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
    <svg class="fullscreen-btn__exit" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/></svg>
  </button>

  <aside class="board-prize" id="boardPrizePanel" hidden>
    <div class="board-prize__inner">
      <div class="board-prize__head" id="boardPrizeHead"></div>
      <div class="board-prize__list" id="boardPrizeList"></div>
    </div>
  </aside>

  <div class="viewport" id="viewport">
    <div class="world" id="world">
      <div class="board" id="board">
        <canvas class="board-canvas" id="boardCanvas"></canvas>
        <div class="board-tiles" id="boardTiles"></div>
        <div class="board-slots" id="boardSlots"></div>
      </div>
    </div>
  </div>

  <button type="button" class="back-btn" id="backBtn" hidden aria-label="back">←</button>

  <div class="reveal-modal" id="revealModal" hidden>
    <div class="reveal-modal__card" id="revealCard">
      <div class="reveal-modal__fx" id="revealFx"></div>
      <div class="reveal-modal__number" id="revealNumber"></div>
      <img class="reveal-modal__image" id="revealImage" alt="" hidden />
      <div class="reveal-modal__grade" id="revealGrade"></div>
      <div class="reveal-modal__name" id="revealName"></div>
      <div class="reveal-modal__actions">
        <button type="button" class="btn-solid btn-solid--back" id="revealBack" aria-label="back">←</button>
        <button type="button" class="btn-solid btn-solid--gold" id="revealNext" aria-label="next">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="4"/><circle cx="8.5" cy="8.5" r="1.25" fill="currentColor" stroke="none"/><circle cx="15.5" cy="8.5" r="1.25" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="1.25" fill="currentColor" stroke="none"/><circle cx="8.5" cy="15.5" r="1.25" fill="currentColor" stroke="none"/><circle cx="15.5" cy="15.5" r="1.25" fill="currentColor" stroke="none"/></svg>
          <span>隨機再一次</span>
        </button>
      </div>
    </div>
  </div>
  </div>

  <script src="/page-transition.js"></script>
  <script src="/price-calc.js"></script>
  <script src="/scratch-texture.js"></script>
  <script src="/scratch-effects.js"></script>
  <script src="/scratch-card.js"></script>
  <script src="/scratch-persist.js"></script>
  <script src="/product-config.js"></script>
  <script src="/board-engine.js"></script>
  <script src="/map-view.js"></script>
  <script src="/board-info.js"></script>
  <script src="/app.js"></script>
</body>
</html>
